    name: Tradogram API
    description: >-
      The Tradogram REST API enables two-way data synchronization between
      Tradogram and external systems. It provides programmatic access to core
      procurement modules including purchase orders, requisitions, suppliers,
      contracts, budgets, AP invoices, and inventory. Authentication is handled
      via API key obtained from the Tradogram dashboard under API Integration
      settings.
